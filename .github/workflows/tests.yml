name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install flask fuzzywuzzy thefuzz python-Levenshtein \
                      pandas openpyxl pdfplumber python-docx \
                      python-pptx chardet

      - name: Run backend tests (389)
        run: python3 test_suite.py

      - name: Run stress tests
        run: python3 pruebas_stress.py

      - name: Run HTTP stress tests
        run: python3 pruebas_http_stress.py
